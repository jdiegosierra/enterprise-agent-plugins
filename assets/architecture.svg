  <text x="417" y="156" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#161632" text-anchor="middle">commands/</text>
  <text x="417" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#7C5D73" text-anchor="middle">13</text>

