  <text x="770" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white" text-anchor="middle">skills + runbooks + agents + guards</text>

  <rect x="645" y="180" width="250" height="30" rx="6" fill="#2A2A50" stroke="#3D3D6B" stroke-width="1"/>
