  <circle cx="724" cy="228" r="2" fill="white" fill-opacity="0.3"/>
  <text x="708" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white" fill-opacity="0.55" text-anchor="end">SRE runbooks</text>
  <circle cx="816" cy="228" r="2" fill="white" fill-opacity="0.3"/>
  <text x="832" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white" fill-opacity="0.55">code delegation</text>

  <!-- Install methods -->
  <rect x="645" y="250" width="120" height="24" rx="5" fill="white" fill-opacity="0.08"/>
  <text x="705" y="266" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white" fill-opacity="0.7" text-anchor="middle">setup-plugin.sh</text>
  <rect x="775" y="250" width="120" height="24" rx="5" fill="white" fill-opacity="0.08"/>
  <text x="835" y="266" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white" fill-opacity="0.7" text-anchor="middle">extraDirs + watch</text>

  <text x="705" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white" fill-opacity="0.4" text-anchor="middle">symlinks to config</text>
  <text x="835" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white" fill-opacity="0.4" text-anchor="middle">auto-reload on pull</text>

